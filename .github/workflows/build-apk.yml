name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        # Use generic ncurses dev packages (libncurses5/ libncursesw5 may be unavailable)
        sudo apt-get install -y -qq \
          build-essential git \
          unzip zip \
          libssl-dev libffi-dev libsqlite3-dev libbz2-dev \
          libncurses-dev libreadline-dev \
          liblzma-dev zlib1g-dev pkg-config \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
    
    - name: Install Python packages
      run: |
        python -m pip install -q --upgrade pip
        python -m pip install -q buildozer cython kivy pydantic
    
    - name: Build APK (debug)
      working-directory: ./kivy_app
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug 2>&1 | tail -50
      timeout-minutes: 120
    
    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: apk-debug
        path: kivy_app/bin/jeumemoire-1.0-debug.apk
        retention-days: 30
    
    - name: Prepare release metadata
      if: success()
      id: prep_release
      run: |
        if [ ! -f "kivy_app/bin/jeumemoire-1.0-debug.apk" ]; then
          echo "APK not found!"
          exit 1
        fi
        VERSION="apk-$(date +%Y.%m.%d)"
        RELEASE_NAME="APK Build - $(date +%Y.%m.%d)"
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV

    - name: Create Release
      if: success()
      uses: actions/create-release@v1
      id: create_release
      with:
        tag_name: ${{ env.VERSION }}
        release_name: ${{ env.RELEASE_NAME }}
        body: "Automatic APK build for Jeu de Mémoire"
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset
      if: success()
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: kivy_app/bin/jeumemoire-1.0-debug.apk
        asset_name: jeumemoire-1.0-debug.apk
        asset_content_type: application/vnd.android.package-archive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
